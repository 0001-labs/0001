<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Projects</title>
    <meta name="description" content="Projects by 0001 - Coming soon." />

    <link rel="stylesheet" href="/design/css/tokens.css" />
    <link rel="stylesheet" href="/design/css/screen.css" />

    <script>
      (function () {
        var root = document.documentElement;
        var theme = localStorage.getItem("theme");
        if (theme !== "dark") {
          theme = "light";
        }
        root.classList.toggle("light-theme", theme === "light");
        root.classList.toggle("dark-theme", theme === "dark");
        root.setAttribute("data-theme", theme);
      })();
    </script>

    <style>
      .projects-page {
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--page-background);
      }

      .projects-header {
        background: var(--chartreuse-green);
        height: 180px;
        padding: 40px 60px 0;
      }

      .projects-header__inner {
        align-items: flex-start;
        display: flex;
        justify-content: space-between;
      }

      .projects-header__logo {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        color: var(--base-slate);
        font-family: var(--font-medium);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 1;
      }

      .projects-header__nav {
        display: flex;
        gap: 32px;
      }

      .projects-header__link {
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .projects-header__link:hover,
      .projects-header__link--active {
        color: var(--every-green);
      }

      .projects-main {
        background: var(--page-background);
        border-top: var(--border-default);
        min-height: calc(100vh - 180px);
        min-height: calc(100dvh - 180px);
        padding: 100px 60px 120px;
      }

      .projects-main__inner {
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 300px;
      }

      .projects-coming-soon {
        color: var(--text-color-faint);
        font-family: var(--font-regular);
        font-size: 13px;
        letter-spacing: -0.26px;
      }

      @media (max-width: 768px) {
        .projects-header {
          height: auto;
          padding: 24px 20px 48px;
        }

        .projects-header__inner {
          flex-direction: column;
          gap: 32px;
        }

        .projects-header__logo,
        .projects-header__link {
          font-size: 16px;
          letter-spacing: -0.32px;
        }

        .projects-header__nav {
          gap: 20px;
        }

        .projects-main {
          min-height: calc(100vh - 136px);
          min-height: calc(100dvh - 136px);
          padding: 48px 20px 80px;
        }

        .projects-main__inner {
          min-height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="projects-page">
      <header class="projects-header">
        <div class="projects-header__inner">
          <a href="/" class="projects-header__logo">0001</a>
          <nav class="projects-header__nav">
            <a href="/0001-projects.html" class="projects-header__link projects-header__link--active">Projects</a>
            <a href="/architecture.html" class="projects-header__link">Architecture</a>
          </nav>
        </div>
      </header>

      <main class="projects-main">
        <div class="projects-main__inner">
          <p class="projects-coming-soon">Coming soon</p>
        </div>
      </main>
    </div>
  </body>
</html>
