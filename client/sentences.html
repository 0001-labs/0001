<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9999 Sentences</title>
    <meta name="description" content="9999 sentences from 0001. The last sentence is never written." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        var root = document.documentElement;
        var theme = localStorage.getItem("theme");
        if (theme !== "dark") {
          theme = "light";
        }
        root.classList.toggle("light-theme", theme === "light");
        root.classList.toggle("dark-theme", theme === "dark");
        root.setAttribute("data-theme", theme);
      })();
    </script>
<!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />
<!-- 0001 components -->
    <script type="module" src="./components/one-footer.ts"></script>

    <!-- Page module -->
    <script type="module" src="./modules/pages/sentences.ts"></script>

    <style>
      .sentences-page {
        background-color: var(--page-background);
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
      }

      .decorative-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 200px;
        height: 150px;
        overflow: hidden;
        cursor: pointer;
        display: block;
      }

      .decorative-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .decorative-image::after {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--image-overlay-tint);
        mix-blend-mode: var(--image-overlay-blend);
      }

      .decorative-image::before {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--image-overlay-wash);
        z-index: 1;
      }

      .sentences-main {
        padding: 200px 0 200px 400px;
      }

      .sentences-title {
        display: flex;
        align-items: baseline;
        margin-bottom: 30px;
      }

      .sentences-title__text {
        font-family: var(--font-canon);
        font-size: 48px;
        letter-spacing: -0.96px;
        color: var(--base-slate);
        font-weight: normal;
      }

      .sentences-description {
        font-family: var(--font-regular);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-slate);
        line-height: 1.5;
        max-width: 451px;
        margin: 0 0 30px 0;
      }

      .sentences-table__column--action {
        display: flex;
        flex-direction: column;
      }

      .sentences-table__column--action .sentences-table__header {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
      }

      .sentences-table {
        display: flex;
      }

      .sentences-table__column {
        display: flex;
        flex-direction: column;
      }

      .sentences-table__column--no {
        width: 80px;
      }

      .sentences-table__column--sentence {
        width: 400px;
      }

      .sentences-table__header {
        padding: 0 1.5px;
        height: 20px;
        min-height: 20px;
        box-sizing: border-box;
        font-family: var(--font-regular);
        font-size: 13px;
        letter-spacing: -0.26px;
        line-height: 1;
        color: var(--base-slate);
        display: flex;
        align-items: flex-end;
      }

      .sentences-table__cell {
        border: 1px solid var(--base-black);
        padding: 0 4.5px;
        height: 20px;
        min-height: 20px;
        box-sizing: border-box;
        font-family: var(--font-regular);
        font-size: 13px;
        letter-spacing: -0.26px;
        line-height: 1;
        color: var(--base-slate);
        display: flex;
        align-items: center;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sentences-table__column--sentence .sentences-table__cell {
        font-family: var(--font-canon);
      }

      .sentences-table__column--no .sentences-table__cell {
        border-right: none;
      }

      .sentences-table__column .sentences-table__cell + .sentences-table__cell {
        border-top: none;
      }

      .sentences-table__cell--hidden {
        color: var(--page-background);
      }

      .sentences-table__input {
        font-family: var(--font-canon);
        font-size: 13px;
        letter-spacing: -0.26px;
        line-height: 1;
        color: var(--base-slate);
        background: transparent;
        border: none;
        outline: none;
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
      }

      .sentences-table__input::placeholder {
        color: var(--input-placeholder);
      }

      .sentences-table__input:focus {
        background-color: var(--input-focus-background);
      }

      .sentences-table__cell--input {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .sentences-table__submit {
        font-family: var(--font-regular);
        font-size: 14px;
        color: var(--footer-control-text);
        background-color: var(--footer-control-background);
        border: 1px solid var(--footer-control-border);
        border-radius: 999px;
        padding: 4px 8px;
        cursor: pointer;
        white-space: nowrap;
        display: none;
      }

      .sentences-table__submit:hover {
        text-decoration: underline;
      }

      .sentences-table__submit.visible {
        display: block;
      }

      .sentences-compact-button {
        align-items: center;
        background: var(--base-slate);
        border: none;
        color: var(--page-background);
        cursor: pointer;
        display: inline-flex;
        height: 20px;
        justify-content: center;
        padding: 0;
        width: 20px;
      }

      .sentences-compact-button svg {
        display: block;
        height: 14px;
        width: 14px;
      }

      .sentences-compact-button:focus-visible {
        outline: 2px solid var(--chartreuse-green);
        outline-offset: 2px;
      }

      @media (max-width: 768px) {
        .decorative-image {
          display: none;
        }

        .sentences-main {
          padding: 96px 20px 48px;
        }

        .sentences-title__text {
          font-size: 40px;
          letter-spacing: -0.8px;
          line-height: 0.94;
        }

        .sentences-description {
          font-size: 14px;
          max-width: 100%;
        }

        .sentences-table {
          width: 100%;
        }

        .sentences-table__column--no {
          width: 64px;
          flex-shrink: 0;
        }

        .sentences-table__column--sentence {
          width: calc(100% - 88px);
          min-width: 0;
          flex: 1 1 auto;
        }

        .sentences-table__column--action {
          width: 24px;
          flex-shrink: 0;
        }

        .sentences-table__header,
        .sentences-table__cell,
        .sentences-table__input {
          font-size: 14px;
          letter-spacing: -0.28px;
        }

        .sentences-table__header,
        .sentences-table__cell {
          height: 20px;
          min-height: 20px;
        }

        .sentences-table__column--sentence .sentences-table__cell {
          min-width: 0;
        }

        .sentences-table__cell--input {
          gap: 6px;
        }

        .sentences-table__submit {
          font-size: 12px;
          padding: 2px 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="sentences-page">
      <!-- Decorative image top-left -->
      <a href="/" class="decorative-image">
        <img src="/assets/imagery/signal-stack.svg" alt="Back to home" />
      </a>

      <!-- Main content -->
      <main class="sentences-main">
        <div class="sentences-content">
          <h1 class="sentences-title">
            <span class="sentences-title__text">9999 sentences</span>
          </h1>

          <p class="sentences-description">A collection of thoughts, principles, and beliefs that guide how we work. Some slots are filled, most remain empty. The last sentence is never written.</p>

          <div class="sentences-table">
            <div class="sentences-table__column sentences-table__column--no" id="column-no">
              <div class="sentences-table__header">No.</div>
            </div>
            <div class="sentences-table__column sentences-table__column--sentence" id="column-sentence">
              <div class="sentences-table__header">Sentence</div>
            </div>
            <div class="sentences-table__column sentences-table__column--action">
              <div class="sentences-table__header">
                <button type="button" class="sentences-compact-button" id="compact-btn" aria-label="Show all rows"></button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <one-footer></one-footer>
    </div>
  </body>
</html>
