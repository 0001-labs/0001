<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Products</title>
    <meta name="description" content="Products by 0001 - Our digital products and tools." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        var root = document.documentElement;
        var theme = localStorage.getItem("theme");
        if (theme !== "dark") {
          theme = "light";
        }
        root.classList.toggle("light-theme", theme === "light");
        root.classList.toggle("dark-theme", theme === "dark");
        root.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />
    <script type="module" src="./modules/pages/products.ts"></script>

    <style>
      .products-page {
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--page-background);
      }

      .products-header {
        background: var(--chartreuse-green);
        height: 180px;
        padding: 40px 60px 0;
      }

      .products-header__inner {
        align-items: flex-start;
        display: flex;
        justify-content: space-between;
      }

      .products-header__logo {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }

      .products-header__logo svg {
        width: 100px;
        height: auto;
      }

      .products-header__nav {
        display: flex;
        align-items: center;
        gap: 32px;
      }

      .products-header__link {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        text-decoration: none;
        white-space: nowrap;
        transition: color 0.2s ease;
      }

      .products-header__link svg {
        flex: 0 0 auto;
      }

      .products-header__link:hover,
      .products-header__link--active {
        color: var(--every-green);
      }

      .products-main {
        background: var(--page-background);
        border-top: var(--border-default);
        min-height: calc(100vh - 180px);
        min-height: calc(100dvh - 180px);
        padding: 100px 60px 120px;
      }

      .products-main__inner {
        align-items: center;
        display: flex;
        flex-direction: column;
      }

      .products-table-wrap {
        max-width: 100%;
        overflow-x: auto;
        width: 100%;
      }

      .products-table {
        background: var(--page-background);
        border-collapse: collapse;
        margin: 0 auto;
        min-width: 400px;
        width: 400px;
      }

      .products-table__header-cell {
        background: var(--page-background);
        box-sizing: border-box;
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 13px;
        font-weight: normal;
        height: 20px;
        letter-spacing: -0.26px;
        line-height: 20px;
        overflow: hidden;
        padding: 0 1px;
        text-align: left;
        text-overflow: ellipsis;
        vertical-align: bottom;
        white-space: nowrap;
      }

      .products-table__header-cell--product {
        width: 160px;
      }

      .products-table__header-cell--users,
      .products-table__header-cell--retention,
      .products-table__header-cell--status {
        width: 80px;
      }

      .products-table__cell {
        background: var(--page-background);
        border: 1px solid var(--base-black);
        box-sizing: border-box;
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 13px;
        height: 20px;
        letter-spacing: -0.26px;
        line-height: 1;
        max-height: 20px;
        overflow: hidden;
        padding: 3px 3px;
        text-overflow: ellipsis;
        vertical-align: middle;
        white-space: nowrap;
      }

      .products-table__cell--product {
        min-width: 0;
      }

      .products-table__product-inner {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .products-table__product-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .products-table__cell--status {
        background: var(--zenith-blue);
      }

      .products-table__cell--status.products-table__cell--ga {
        background: var(--zenith-blue);
      }

      .products-table__cell--status.products-table__cell--alpha {
        background: var(--chartreuse-green);
      }

      .products-table__cell--status.products-table__cell--on-hold {
        background: var(--status-on-hold);
      }

      .products-table__cell--status.products-table__cell--planned {
        background: var(--status-planned);
      }

      .products-table__cell--status.products-table__cell--archived {
        background: var(--status-archived);
      }

      .products-table__link {
        align-items: center;
        color: inherit;
        display: inline-flex;
        flex-shrink: 0;
        height: 14px;
        justify-content: center;
        margin-left: 4px;
        text-decoration: none;
        width: 14px;
      }

      .products-table__link svg {
        display: block;
        height: 14px;
        width: 14px;
      }

      .products-svg-bg {
        fill: var(--chartreuse-green);
      }

      .products-meta {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 20px;
        width: 400px;
      }

      .products-meta__links {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .products-meta__copyright {
        color: var(--text-color-faint);
        font-family: var(--font-medium);
        font-size: 14px;
        font-weight: 500;
        letter-spacing: -0.28px;
        line-height: 20px;
      }

      .products-page .products-meta__links > a.button {
        display: inline-block !important;
        box-sizing: border-box;
        height: 16px !important;
        max-height: 16px !important;
        min-height: 0 !important;
        padding: 0 !important;
        margin: 0;
        font-family: var(--font-canon) !important;
        font-size: 14px !important;
        line-height: 16px !important;
        letter-spacing: -0.32px;
        font-weight: 400;
        color: var(--footer-control-text) !important;
        background-color: var(--footer-control-background) !important;
        border: none !important;
        border-radius: 0 !important;
        vertical-align: top;
        overflow: hidden;
        white-space: nowrap;
        text-decoration: none !important;
        -webkit-tap-highlight-color: transparent;
      }

      .products-page .products-meta__links > a.button:hover {
        opacity: 0.9;
        background-color: var(--footer-control-hover) !important;
      }

      @media (max-width: 768px) {
        .products-header {
          height: auto;
          padding: calc(24px * var(--sf)) calc(20px * var(--sf)) calc(48px * var(--sf));
        }

        .products-header__inner {
          align-items: flex-start;
          flex-direction: column;
          gap: calc(24px * var(--sf));
        }

        .products-header__logo svg {
          width: calc(84px * var(--sf));
        }

        .products-header__link {
          font-size: calc(14px * var(--sf));
          letter-spacing: calc(-0.28px * var(--sf));
          line-height: 1.2;
        }

        .products-header__nav {
          flex-wrap: wrap;
          gap: calc(16px * var(--sf));
        }

        .products-main {
          min-height: calc(100vh - 120px);
          min-height: calc(100dvh - 120px);
          padding: calc(28px * var(--sf)) calc(12px * var(--sf)) calc(48px * var(--sf));
        }

        .products-main__inner {
          align-items: stretch;
        }

        .products-table-wrap {
          overflow-x: visible;
        }

        .products-table {
          min-width: 0;
          width: 100%;
          table-layout: fixed;
        }

        .products-table__header-cell,
        .products-table__cell {
          font-size: calc(11px * var(--sf));
          letter-spacing: calc(-0.22px * var(--sf));
          height: calc(28px * var(--sf));
          padding: calc(6px * var(--sf)) calc(4px * var(--sf));
        }

        .products-table__header-cell--product {
          width: 40%;
        }

        .products-table__header-cell--users,
        .products-table__header-cell--retention,
        .products-table__header-cell--status {
          width: 20%;
        }

        .products-table__product-name {
          display: block;
          min-width: 0;
        }

        .products-meta {
          gap: calc(20px * var(--sf));
          margin-top: calc(24px * var(--sf));
          width: 100%;
        }

        .products-meta__links {
          gap: calc(12px * var(--sf));
          flex-wrap: wrap;
        }

        .products-meta__copyright {
          font-size: calc(14px * var(--sf));
          letter-spacing: calc(-0.28px * var(--sf));
          line-height: calc(16px * var(--sf));
        }

        .products-page .products-meta__links > a.button {
          height: calc(24px * var(--sf)) !important;
          max-height: calc(24px * var(--sf)) !important;
          padding: 0 calc(12px * var(--sf)) !important;
          font-size: calc(16px * var(--sf)) !important;
          line-height: calc(24px * var(--sf)) !important;
          letter-spacing: calc(-0.32px * var(--sf));
        }
      }
    </style>
  </head>
