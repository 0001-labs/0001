<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <meta name="description" content="Products by 0001 - Our digital products and tools." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const theme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- DS one CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/DS1/1-root/one.css" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />

    <!-- DS one i18n setup -->
    <script>
      window.DS_ONE_TRANSLATIONS_FILE = "./language/translations.json";
    </script>

    <!-- DS one bundle -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js"></script>

    <!-- Page module -->
    <script type="module" src="./modules/pages/products.ts"></script>

    <style>
      .products-page {
        min-height: 100vh;
        background: var(--chartreuse-green);
      }

      .products-header {
        height: 180px;
        padding: 40px 60px 0;
      }

      .products-header__inner {
        align-items: flex-start;
        display: flex;
        justify-content: space-between;
      }

      .products-header__logo {
        color: var(--base-slate);
        font-family: var(--font-medium);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        text-decoration: none;
      }

      .products-header__nav {
        display: flex;
        gap: 32px;
      }

      .products-header__link {
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .products-header__link:hover,
      .products-header__link--active {
        color: var(--every-green);
      }

      .products-main {
        background: #fcfff6;
        border-top: 1.5px solid rgba(0, 0, 0, 0.1);
        min-height: calc(100vh - 180px);
        padding: 100px 60px 120px;
      }

      .products-main__inner {
        align-items: center;
        display: flex;
        flex-direction: column;
      }

      .products-table-wrap {
        max-width: 100%;
        overflow-x: auto;
        width: 100%;
      }

      .products-table {
        background: #fcfff6;
        border-collapse: collapse;
        margin: 0 auto;
        min-width: 400px;
        width: 400px;
      }

      .products-table__header-cell {
        background: #fcfff6;
        box-sizing: border-box;
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 13px;
        font-weight: normal;
        height: 20px;
        letter-spacing: -0.26px;
        line-height: 20px;
        overflow: hidden;
        padding: 0 1px;
        text-align: left;
        text-overflow: ellipsis;
        vertical-align: bottom;
        white-space: nowrap;
      }

      .products-table__header-cell--product {
        width: 160px;
      }

      .products-table__header-cell--users,
      .products-table__header-cell--retention,
      .products-table__header-cell--status {
        width: 80px;
      }

      .products-table__cell {
        background: #fcfff6;
        border: 1px solid var(--base-black);
        box-sizing: border-box;
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 13px;
        height: 20px;
        letter-spacing: -0.26px;
        line-height: 1;
        max-height: 20px;
        overflow: hidden;
        padding: 3px 3px;
        text-overflow: ellipsis;
        vertical-align: middle;
        white-space: nowrap;
      }

      .products-table__cell--product {
        min-width: 0;
      }

      .products-table__product-inner {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .products-table__product-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .products-table__cell--status {
        background: var(--zenith-blue);
      }

      .products-table__cell--status.products-table__cell--ga {
        background: var(--chartreuse-green);
      }

      .products-table__cell--status.products-table__cell--alpha {
        background: #ffe97a;
      }

      .products-table__cell--status.products-table__cell--on-hold {
        background: #ffd7bf;
      }

      .products-table__cell--status.products-table__cell--planned {
        background: #f2ffcf;
      }

      .products-table__cell--status.products-table__cell--archived {
        background: #ececec;
      }

      .products-table__link {
        align-items: center;
        color: inherit;
        display: inline-flex;
        flex-shrink: 0;
        height: 14px;
        justify-content: center;
        margin-left: 4px;
        text-decoration: none;
        width: 14px;
      }

      .products-table__link svg {
        display: block;
        height: 14px;
        width: 14px;
      }

      .products-meta {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 20px;
        width: 400px;
      }

      .products-meta__language {
        align-items: center;
        align-self: flex-start;
        background: rgba(0, 0, 0, 0.3);
        border: none;
        color: var(--base-black);
        cursor: pointer;
        display: inline-flex;
        font-family: var(--font-regular);
        font-size: 11.6px;
        height: 14.3px;
        justify-content: center;
        letter-spacing: -0.23px;
        line-height: 11.6px;
        min-width: 33px;
        padding: 0 7px;
      }

      .products-meta__language:hover {
        background: rgba(0, 0, 0, 0.36);
      }

      .products-meta__copyright {
        color: rgba(0, 0, 0, 0.3);
        font-family: var(--font-regular);
        font-size: 12.5px;
        letter-spacing: -0.25px;
        line-height: 16px;
      }

      html.mobile .products-header {
        height: auto;
        padding: calc(24px * var(--sf)) calc(20px * var(--sf)) calc(48px * var(--sf));
      }

      html.mobile .products-header__inner {
        align-items: flex-start;
        flex-direction: column;
        gap: calc(24px * var(--sf));
      }

      html.mobile .products-header__logo,
      html.mobile .products-header__link,
      html.mobile .products-table__header-cell,
      html.mobile .products-table__cell {
        font-size: calc(16px * var(--sf));
        letter-spacing: calc(-0.32px * var(--sf));
      }

      html.mobile .products-header__nav {
        flex-wrap: wrap;
        gap: calc(18px * var(--sf));
      }

      html.mobile .products-main {
        min-height: calc(100vh - 120px * var(--sf));
        padding: calc(40px * var(--sf)) calc(20px * var(--sf)) calc(64px * var(--sf));
      }

      html.mobile .products-table {
        min-width: 500px;
      }

      html.mobile .products-table__header-cell,
      html.mobile .products-table__cell {
        height: calc(30px * var(--sf));
        padding: calc(7px * var(--sf)) calc(5px * var(--sf));
      }

      html.mobile .products-meta {
        gap: calc(20px * var(--sf));
        margin-top: calc(24px * var(--sf));
        width: 100%;
      }

      html.mobile .products-meta__language {
        font-size: calc(15px * var(--sf));
        height: calc(22px * var(--sf));
        letter-spacing: calc(-0.3px * var(--sf));
        min-width: calc(46px * var(--sf));
      }

      html.mobile .products-meta__copyright {
        font-size: calc(16px * var(--sf));
        letter-spacing: calc(-0.32px * var(--sf));
        line-height: calc(22px * var(--sf));
      }
    </style>
  </head>
  <body>
    <div class="products-page">
      <header class="products-header">
        <div class="products-header__inner">
          <a href="/" class="products-header__logo"><ds-text>0001</ds-text></a>
          <nav class="products-header__nav">
            <a href="/products" class="products-header__link products-header__link--active"><ds-text>Products</ds-text></a>
            <a href="/architecture" class="products-header__link"><ds-text>Architecture</ds-text></a>
          </nav>
        </div>
      </header>

      <main class="products-main">
        <div class="products-main__inner">
          <div class="products-table-wrap">
            <table class="products-table">
              <!-- PRODUCTS_TABLE_START -->
              <thead>
                <tr>
                  <th class="products-table__header-cell products-table__header-cell--product"><ds-text>Product</ds-text></th>
                  <th class="products-table__header-cell products-table__header-cell--users"><ds-text>Users</ds-text></th>
                  <th class="products-table__header-cell products-table__header-cell--retention"><ds-text>Retention</ds-text></th>
                  <th class="products-table__header-cell products-table__header-cell--status"><ds-text>Status</ds-text></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="products-table__cell products-table__cell--product">DS one</td>
                  <td class="products-table__cell">0</td>
                  <td class="products-table__cell">0%</td>
                  <td class="products-table__cell products-table__cell--status products-table__cell--alpha">Alpha</td>
                </tr>

                <tr>
                  <td class="products-table__cell products-table__cell--product">Consistency</td>
                  <td class="products-table__cell">1</td>
                  <td class="products-table__cell">0%</td>
                  <td class="products-table__cell products-table__cell--status products-table__cell--in-progress">In progress</td>
                </tr>

                <tr>
                  <td class="products-table__cell products-table__cell--product">allmythin.gs</td>
                  <td class="products-table__cell">0</td>
                  <td class="products-table__cell">0%</td>
                  <td class="products-table__cell products-table__cell--status products-table__cell--on-hold">On hold</td>
                </tr>

                <tr>
                  <td class="products-table__cell products-table__cell--product">Digte</td>
                  <td class="products-table__cell">0</td>
                  <td class="products-table__cell">0%</td>
                  <td class="products-table__cell products-table__cell--status products-table__cell--on-hold">On hold</td>
                </tr>

                <tr>
                  <td class="products-table__cell products-table__cell--product">tau99</td>
                  <td class="products-table__cell">0</td>
                  <td class="products-table__cell">0%</td>
                  <td class="products-table__cell products-table__cell--status products-table__cell--on-hold">On hold</td>
                </tr>

                <tr>
                  <td class="products-table__cell products-table__cell--product">Ezo</td>
                  <td class="products-table__cell">0</td>
                  <td class="products-table__cell">0%</td>
                  <td class="products-table__cell products-table__cell--status products-table__cell--on-hold">On hold</td>
                </tr>
              </tbody>
              <!-- PRODUCTS_TABLE_END -->
            </table>
          </div>

          <div class="products-meta">
            <button type="button" class="products-meta__language" id="products-language-toggle"><ds-text>EN</ds-text></button>
            <p class="products-meta__copyright">0001 © <ds-date format="YYYY"></ds-date></p>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
