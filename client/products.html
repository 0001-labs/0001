<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <meta name="description" content="Products by 0001 - Our digital products and tools." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const theme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- DS one CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/DS1/1-root/one.css" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />

    <!-- DS one i18n setup -->
    <script>
      window.DS_ONE_TRANSLATIONS_FILE = "./language/translations.json";
    </script>

    <!-- DS one bundle -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js"></script>

    <!-- Page module -->
    <script type="module" src="./modules/pages/products.ts"></script>

    <style>
      .products-page {
        min-height: 100vh;
        background: var(--chartreuse-green);
      }

      .products-header {
        height: 180px;
        padding: 40px 60px 0;
      }

      .products-header__inner {
        align-items: flex-start;
        display: flex;
        justify-content: space-between;
      }

      .products-header__logo {
        color: var(--base-slate);
        font-family: var(--font-medium);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        text-decoration: none;
      }

      .products-header__nav {
        display: flex;
        gap: 32px;
      }

      .products-header__link {
        color: var(--base-slate);
        font-family: var(--font-regular);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .products-header__link:hover,
      .products-header__link--active {
        color: var(--every-green);
      }

      .products-main {
        background: #fcfff6;
        border-top: 1.5px solid rgba(0, 0, 0, 0.1);
        min-height: calc(100vh - 180px);
        padding: 100px 60px 120px;
      }

      .products-main__inner {
        align-items: center;
        display: flex;
        flex-direction: column;
      }

      .products-table-wrap {
        max-width: 100%;
        overflow-x: auto;
        width: 100%;
      }

      .products-table {
        margin: 0 auto;
        min-width: 600px;
        width: 600px;
      }

      .products-table__header,
      .products-table__row {
        display: grid;
        grid-template-columns: 240px 120px 120px 120px;
      }

      .products-table__header {
        margin-bottom: 0;
      }

      .products-table__header-cell {
        align-items: flex-end;
        color: var(--base-slate);
        display: flex;
        font-family: var(--font-regular);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        min-height: 30px;
        overflow: hidden;
        padding: 7.5px 1.5px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .products-table__cell {
        align-items: center;
        border-bottom: 1.5px solid var(--base-black);
        border-right: 1.5px solid var(--base-black);
        color: var(--base-slate);
        display: flex;
        font-family: var(--font-regular);
        font-size: 19.5px;
        letter-spacing: -0.39px;
        line-height: 15px;
        min-height: 30px;
        overflow: hidden;
        padding: 7.5px 4.5px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .products-table__row:first-of-type .products-table__cell {
        border-top: 1.5px solid var(--base-black);
      }

      .products-table__cell--product {
        border-left: 1.5px solid var(--base-black);
        justify-content: space-between;
        min-width: 0;
      }

      .products-table__product-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .products-table__cell--status {
        background: var(--zenith-blue);
      }

      .products-table__cell--status.products-table__cell--ga {
        background: var(--chartreuse-green);
      }

      .products-table__cell--status.products-table__cell--alpha {
        background: #ffe97a;
      }

      .products-table__cell--status.products-table__cell--on-hold {
        background: #ffd7bf;
      }

      .products-table__cell--status.products-table__cell--planned {
        background: #f2ffcf;
      }

      .products-table__cell--status.products-table__cell--archived {
        background: #ececec;
      }

      .products-table__link {
        align-items: center;
        color: inherit;
        display: inline-flex;
        flex-shrink: 0;
        height: 24px;
        justify-content: center;
        margin-left: 8px;
        text-decoration: none;
        width: 24px;
      }

      .products-table__link svg {
        display: block;
        height: 24px;
        width: 24px;
      }

      .products-meta {
        display: flex;
        flex-direction: column;
        gap: 26px;
        margin-top: 21px;
        width: 600px;
      }

      .products-meta__language {
        align-items: center;
        align-self: flex-start;
        background: rgba(0, 0, 0, 0.3);
        border: none;
        color: var(--base-black);
        cursor: pointer;
        display: inline-flex;
        font-family: var(--font-regular);
        font-size: 17.44px;
        height: 21.47px;
        justify-content: center;
        letter-spacing: -0.35px;
        line-height: 17.44px;
        min-width: 49.91px;
        padding: 0 10px;
      }

      .products-meta__language:hover {
        background: rgba(0, 0, 0, 0.36);
      }

      .products-meta__copyright {
        color: rgba(0, 0, 0, 0.3);
        font-family: var(--font-regular);
        font-size: 18.78px;
        letter-spacing: -0.38px;
        line-height: 24px;
      }

      html.mobile .products-header {
        height: auto;
        padding: calc(24px * var(--sf)) calc(20px * var(--sf)) calc(48px * var(--sf));
      }

      html.mobile .products-header__inner {
        align-items: flex-start;
        flex-direction: column;
        gap: calc(24px * var(--sf));
      }

      html.mobile .products-header__logo,
      html.mobile .products-header__link,
      html.mobile .products-table__header-cell,
      html.mobile .products-table__cell {
        font-size: calc(16px * var(--sf));
        letter-spacing: calc(-0.32px * var(--sf));
      }

      html.mobile .products-header__nav {
        flex-wrap: wrap;
        gap: calc(18px * var(--sf));
      }

      html.mobile .products-main {
        min-height: calc(100vh - 120px * var(--sf));
        padding: calc(40px * var(--sf)) calc(20px * var(--sf)) calc(64px * var(--sf));
      }

      html.mobile .products-table {
        min-width: 500px;
      }

      html.mobile .products-table__header,
      html.mobile .products-table__row {
        grid-template-columns: minmax(200px, 1fr) 100px 100px 120px;
      }

      html.mobile .products-table__header-cell,
      html.mobile .products-table__cell {
        min-height: calc(30px * var(--sf));
        padding: calc(7px * var(--sf)) calc(5px * var(--sf));
      }

      html.mobile .products-meta {
        gap: calc(20px * var(--sf));
        margin-top: calc(24px * var(--sf));
        width: 100%;
      }

      html.mobile .products-meta__language {
        font-size: calc(15px * var(--sf));
        height: calc(22px * var(--sf));
        letter-spacing: calc(-0.3px * var(--sf));
        min-width: calc(46px * var(--sf));
      }

      html.mobile .products-meta__copyright {
        font-size: calc(16px * var(--sf));
        letter-spacing: calc(-0.32px * var(--sf));
        line-height: calc(22px * var(--sf));
      }
    </style>
  </head>
  <body>
    <div class="products-page">
      <header class="products-header">
        <div class="products-header__inner">
          <a href="/" class="products-header__logo"><ds-text>0001</ds-text></a>
          <nav class="products-header__nav">
            <a href="/products" class="products-header__link products-header__link--active"><ds-text>Products</ds-text></a>
            <a href="#" class="products-header__link"><ds-text>Architecture</ds-text></a>
          </nav>
        </div>
      </header>

      <main class="products-main">
        <div class="products-main__inner">
          <div class="products-table-wrap">
            <div class="products-table">

                </div>
                <div class="products-table__cell">0</div>
                <div class="products-table__cell">0%</div>
                <div class="products-table__cell products-table__cell--status products-table__cell--alpha">Alpha</div>
              </div>

              <div class="products-table__row">
                <div class="products-table__cell products-table__cell--product">

                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <rect x="0" y="0" width="24" height="24" fill="#CCFF4D" />

                      <path d="M6 11.5L12 5.5L18 11.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" />
                      <path d="M7.5 18.5H16.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                    </svg>
                  </a>
                </div>
                <div class="products-table__cell">1</div>
                <div class="products-table__cell">0%</div>
                <div class="products-table__cell products-table__cell--status products-table__cell--in-progress">In progress</div>
              </div>

              <div class="products-table__row">
                <div class="products-table__cell products-table__cell--product">
                  <span class="products-table__product-name">allmythin.gs</span>
                  <a href="https://allmythin.gs" target="_blank" rel="noopener" class="products-table__link" aria-label="Open allmythin.gs">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <rect x="0" y="0" width="24" height="24" fill="#CCFF4D" />
                      <path d="M12 5.5V19" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                      <path d="M6 11.5L12 5.5L18 11.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" />
                      <path d="M7.5 18.5H16.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                    </svg>
                  </a>
                </div>
                <div class="products-table__cell">0</div>
                <div class="products-table__cell">0%</div>
                <div class="products-table__cell products-table__cell--status products-table__cell--on-hold">On hold</div>
              </div>

              <div class="products-table__row">
                <div class="products-table__cell products-table__cell--product">
                  <span class="products-table__product-name">Digte</span>
                  <a href="https://digte.co" target="_blank" rel="noopener" class="products-table__link" aria-label="Open Digte">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <rect x="0" y="0" width="24" height="24" fill="#CCFF4D" />
                      <path d="M12 5.5V19" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                      <path d="M6 11.5L12 5.5L18 11.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" />
                      <path d="M7.5 18.5H16.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                    </svg>
                  </a>
                </div>
                <div class="products-table__cell">0</div>
                <div class="products-table__cell">0%</div>
                <div class="products-table__cell products-table__cell--status products-table__cell--on-hold">On hold</div>
              </div>

              <div class="products-table__row">
                <div class="products-table__cell products-table__cell--product">
                  <span class="products-table__product-name">tau99</span>
                  <a href="https://tau99.com" target="_blank" rel="noopener" class="products-table__link" aria-label="Open tau99">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <rect x="0" y="0" width="24" height="24" fill="#CCFF4D" />
                      <path d="M12 5.5V19" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                      <path d="M6 11.5L12 5.5L18 11.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" />
                      <path d="M7.5 18.5H16.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                    </svg>
                  </a>
                </div>
                <div class="products-table__cell">0</div>
                <div class="products-table__cell">0%</div>
                <div class="products-table__cell products-table__cell--status products-table__cell--on-hold">On hold</div>
              </div>

              <div class="products-table__row">
                <div class="products-table__cell products-table__cell--product">
                  <span class="products-table__product-name">Ezo</span>
                  <a href="https://ezo-app.com" target="_blank" rel="noopener" class="products-table__link" aria-label="Open Ezo">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <rect x="0" y="0" width="24" height="24" fill="#CCFF4D" />
                      <path d="M12 5.5V19" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />
                      <path d="M6 11.5L12 5.5L18 11.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" />
                      <path d="M7.5 18.5H16.5" stroke="#000000" stroke-width="1.5" stroke-linecap="square" />

              </div>
              <!-- PRODUCTS_TABLE_END -->
            </div>
          </div>

          <div class="products-meta">
            <button type="button" class="products-meta__language" id="products-language-toggle"><ds-text>EN</ds-text></button>
            <p class="products-meta__copyright">0001 © <ds-date format="YYYY"></ds-date></p>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
