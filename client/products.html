<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <meta name="description" content="Products by 0001 - Our digital products and tools." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const theme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- DS one CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/DS1/1-root/one.css" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />

    <!-- DS one i18n setup -->
    <script>
      window.DS_ONE_TRANSLATIONS_FILE = "./language/translations.json";
    </script>

    <!-- DS one bundle -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js"></script>

    <!-- 0001 components -->
    <script type="module" src="./components/one-footer.js"></script>

    <style>
      .products-page {
        background-color: #FFFFFF;
        min-height: 100vh;
        position: relative;
      }

      .products-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100px;
        background-color: #CCFF4D;
        z-index: 10;
      }

      .products-content {
        position: relative;
        background-color: #FFFFFF;
        margin-top: 100px;
        padding: 80px 60px 120px;
        min-height: calc(100vh - 100px);
      }

      .products-table {
        display: flex;
        justify-content: center;
      }

      .table__column--product {
        width: 180px;
      }

      .table__column--users,
      .table__column--retention,
      .table__column--status {
        width: 100px;
      }

      /* Override border to 1px */
      .table__cell {
        border: 1px solid var(--base-slate);
        border-top: none;
        border-left: none;
      }

      .table__column--product .table__cell {
        border-left: 1px solid var(--base-slate);
      }

      .table__column .table__cell:nth-child(2) {
        border-top: 1px solid var(--base-slate);
      }

      .table__header {
        border: none;
      }

      /* Status colors */
      .table__cell--ga {
        background-color: var(--apple-green);
      }

      .table__cell--alpha {
        background-color: var(--yellow);
      }

      .table__cell--in-progress {
        background-color: var(--pink);
      }

      .table__cell--on-hold {
        background-color: var(--orange);
      }

      .table__cell--planned {
        background-color: #f2ffcf;
      }


      /* Mobile styles - using DS one .mobile class and --sf scaling factor */
      html.mobile .products-header {
        height: calc(60px * var(--sf));
      }

      html.mobile .products-content {
        margin-top: calc(60px * var(--sf));
        padding: calc(40px * var(--sf)) calc(20px * var(--sf));
      }

      html.mobile .products-table {
        flex-direction: column;
        overflow-x: auto;
      }

      html.mobile .table__column {
        flex-direction: row;
        width: 100%;
      }

      html.mobile .table__column--product,
      html.mobile .table__column--users,
      html.mobile .table__column--retention,
      html.mobile .table__column--status {
        width: 100%;
      }

      html.mobile .table__header {
        font-size: calc(14px * var(--sf));
        padding: calc(6px * var(--sf));
        min-width: calc(80px * var(--sf));
      }

      html.mobile .table__cell {
        font-size: calc(14px * var(--sf));
        padding: calc(6px * var(--sf));
        height: auto;
        min-height: calc(28px * var(--sf));
      }

    </style>
  </head>
  <body>
    <div class="products-page">
      <!-- Header -->
      <header class="products-header">
        <div class="header">
          <a href="/" class="header__logo"><ds-text>0001</ds-text></a>
          <nav class="header__nav">
            <a href="/products" class="header__link header__link--active"><ds-text>Products</ds-text></a>
            <a href="#" class="header__link"><ds-text>Architecture</ds-text></a>
          </nav>
        </div>
      </header>

      <!-- Main content -->
      <main class="products-content">
        <div class="products-table">
          <!-- Product column -->
          <div class="table__column table__column--product">
            <div class="table__header">Product</div>
            
          </div>

          <!-- Users column -->
          <div class="table__column table__column--users">
            <div class="table__header">Users</div>
            
          </div>

          <!-- Retention column -->
          <div class="table__column table__column--retention">
            <div class="table__header">Retention</div>
            
          </div>

          <!-- Status column -->
          <div class="table__column table__column--status">
            <div class="table__header">Status</div>
            
          </div>
        </div>

      <!-- Footer -->
      <one-footer></one-footer>
      </main>
    </div>

    <script>
      // Set initial language from localStorage on page load
      (async () => {
        const savedLang = localStorage.getItem('language');
        if (savedLang && savedLang !== 'en') {
          const dsOne = await import('https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js');
          dsOne.setLanguage(savedLang);
        }
      })();
    </script>
  </body>
</html>
