<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you</title>
    <meta name="description" content="Thank you for contacting 0001. We'll get in touch with you." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        var root = document.documentElement;
        var theme = localStorage.getItem("theme");
        if (theme !== "dark") {
          theme = "light";
        }
        root.classList.toggle("light-theme", theme === "light");
        root.classList.toggle("dark-theme", theme === "dark");
        root.setAttribute("data-theme", theme);
      })();
    </script>
<!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />
<!-- Page module -->
    <script type="module" src="./modules/pages/thank-you.ts"></script>

    <style>
      .thankyou-page {
        background-color: var(--page-background);
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
      }

      .thankyou-logo {
        position: absolute;
        top: 115px;
        left: 140px;
        font-family: var(--font-medium);
        font-weight: 500;
        font-size: 24px;
        letter-spacing: -0.48px;
        color: var(--base-slate);
        text-decoration: none;
      }

      .thankyou-main {
        padding: 200px 60px 150px 400px;
        display: flex;
        flex-direction: column;
        gap: 87px;
      }

      .thankyou-header {
        display: flex;
        align-items: flex-start;
        gap: 20px;
      }

      .thankyou-title {
        font-family: var(--font-canon);
        font-size: 48px;
        letter-spacing: -0.96px;
        color: var(--base-slate);
        font-weight: normal;
        margin: 0;
      }

      .thankyou-icon {
        width: 20px;
        height: 20px;
        margin-top: 10px;
        color: var(--text-color-subtle);
      }

      .thankyou-description {
        font-family: var(--font-regular);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-black);
        line-height: 1.5;
        max-width: 451px;
        margin: 0;
      }

      .thankyou-hint {
        font-family: var(--font-regular);
        font-size: 14px;
        letter-spacing: -0.28px;
        color: var(--text-color-subtle);
        margin: 16px 0 0 0;
      }

      .home-footer {
        background-color: var(--page-background);
        padding: 60px 374px 50px 400px;
        display: flex;
        flex-direction: column;
        gap: 70px;
        position: relative;
        margin-top: 400px;
      }

      .home-footer__top {
        display: flex;
        align-items: center;
      }

      .home-footer__brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        width: 300px;
      }

      .home-footer__brand-name {
        font-family: var(--font-medium);
        font-weight: 500;
        font-size: 16px;
        line-height: 1;
        letter-spacing: -0.32px;
        color: var(--base-black);
      }

      .home-footer__tagline {
        font-family: var(--font-canon);
        font-size: 16px;
        line-height: 1;
        letter-spacing: -0.32px;
        color: var(--base-slate);
      }

      .home-footer__controls {
        display: flex;
        gap: 20px;
        width: 150px;
      }

      .home-footer__nav {
        display: flex;
        padding-left: 150px;
        height: 200px;
      }

      .home-footer__nav-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 150px;
      }

      .home-footer__link {
        font-family: var(--font-canon);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--footer-link-color);
        text-decoration: none;
      }

      .home-footer__link:hover {
        text-decoration: underline;
      }

      .home-footer__link--product {
        font-family: var(--font-medium);
      }

      .home-footer__bottom {
        position: absolute;
        left: 0;
        bottom: 50px;
        width: 400px;
        padding-left: 60px;
      }

      .home-footer__copyright {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: var(--footer-copyright);
        display: flex;
        gap: 12px;
        margin: 0;
      }

      .home-footer__social-link {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: var(--footer-copyright);
        text-decoration: none;
      }

      .home-footer__social-link:hover {
        color: var(--footer-link-color);
      }

      @media (max-width: 768px) {
        .thankyou-logo {
          position: relative;
          top: auto;
          left: auto;
          display: block;
          padding: 28px 20px 0;
          font-size: 20px;
          line-height: 1;
        }

        .thankyou-main {
          padding: 16px 20px 20px;
          gap: 32px;
        }

        .thankyou-header {
          flex-direction: column;
          gap: 18px;
        }

        .thankyou-title {
          font-size: 40px;
          letter-spacing: -0.8px;
        }

        .thankyou-description {
          font-size: 14px;
          max-width: 100%;
        }

        .thankyou-hint {
          font-size: 12px;
          margin-top: 12px;
        }

        .home-footer {
          margin-top: 48px;
          padding: 32px 20px;
          gap: 32px;
        }

        .home-footer__top {
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
        }

        .home-footer__brand {
          width: 100%;
          flex-wrap: wrap;
          gap: 6px;
        }

        .home-footer__controls {
          width: auto;
          gap: 10px;
        }

        .home-footer__nav {
          flex-direction: column;
          gap: 24px;
          padding-left: 0;
          height: auto;
        }

        .home-footer__nav-column {
          width: 100%;
          gap: 16px;
        }

        .home-footer__bottom {
          position: static;
          width: auto;
          padding-left: 0;
        }

        .home-footer__copyright {
          flex-wrap: wrap;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="thankyou-page">
      <!-- Logo -->
      <a href="/" class="thankyou-logo">0001</a>

      <!-- Main content -->
      <main class="thankyou-main">
        <div class="thankyou-header">
          <h1 class="thankyou-title">Thank you</h1>
          <svg class="thankyou-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.5" y="0.5" width="19" height="19" stroke="currentColor" stroke-opacity="0.3"/>
            <text x="10" y="14" text-anchor="middle" font-family="var(--font-medium)" font-size="12" fill="currentColor">1</text>
          </svg>
        </div>

        <p class="thankyou-description">We'll get in touch with you.</p>
        <p class="thankyou-hint">We sent a copy of your inquiry to your email.</p>
      </main>

      <!-- Footer -->
      <footer class="home-footer">
        <div class="home-footer__top">
          <div class="home-footer__brand">
            <span class="home-footer__brand-name">0001</span>
            <span class="home-footer__tagline"><span data-i18n="We deliver digital products">We deliver digital products</span></span>
          </div>
          <div class="home-footer__controls">
            <button type="button" class="button" id="lang-toggle"><span data-i18n="English">English</span></button>
            <button type="button" class="button" id="theme-toggle"><span data-theme-label>Light</span></button>
          </div>
        </div>

        <nav class="home-footer__nav">
          <div class="home-footer__nav-column">
            <a href="/services" class="home-footer__link"><span data-i18n="Services">Services</span></a>
            <a href="/sentences" class="home-footer__link"><span data-i18n="9999 sentences">9999 sentences</span></a>
            <a href="/about" class="home-footer__link"><span data-i18n="About">About</span></a>
            <a href="/tokushoho" class="home-footer__link">Tokushoho</a>
            <a href="/contact" class="home-footer__link button"><span data-i18n="Contact">Contact</span></a>
          </div>
          <div class="home-footer__nav-column">
            <a href="/products" class="home-footer__link home-footer__link--product"><span data-i18n="Products">Products</span></a>
            <a href="#" class="home-footer__link home-footer__link--product"><span data-i18n="Architecture">Architecture</span></a>
          </div>
        </nav>

        <div class="home-footer__bottom">
          <p class="home-footer__copyright">
            <span>0001 © <span data-current-year></span></span>
            <a href="https://www.instagram.com/0001hq/" class="home-footer__social-link">Instagram</a>
            <a href="https://www.linkedin.com/company/000one/" class="home-footer__social-link">LinkedIn</a>
          </p>
        </div>
      </footer>
    </div>
  </body>
</html>
