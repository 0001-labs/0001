<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - 0001</title>
    <meta name="description" content="Thank you for contacting 0001. We'll get in touch with you." />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const theme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- DS one CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/DS1/1-root/one.css" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />

    <!-- DS one i18n setup -->
    <script>
      window.DS_ONE_TRANSLATIONS_FILE = "./language/translations.json";
    </script>

    <!-- DS one bundle -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js"></script>

    <style>
      .thankyou-page {
        background-color: #FFFFFF;
        min-height: 100vh;
        position: relative;
      }

      .thankyou-logo {
        position: absolute;
        top: 115px;
        left: 140px;
        font-family: var(--font-medium), "GT America", -apple-system, sans-serif;
        font-weight: 500;
        font-size: 24px;
        letter-spacing: -0.48px;
        color: var(--base-slate);
        text-decoration: none;
      }

      .thankyou-main {
        padding: 200px 60px 150px 400px;
        display: flex;
        flex-direction: column;
        gap: 87px;
      }

      .thankyou-header {
        display: flex;
        align-items: flex-start;
        gap: 20px;
      }

      .thankyou-title {
        font-family: var(--typeface-canon), Georgia, serif;
        font-size: 48px;
        letter-spacing: -0.96px;
        color: var(--base-slate);
        font-weight: normal;
        margin: 0;
      }

      .thankyou-icon {
        width: 20px;
        height: 20px;
        margin-top: 10px;
      }

      .thankyou-description {
        font-family: var(--font-regular), "GT America", -apple-system, sans-serif;
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-black);
        line-height: 1.5;
        max-width: 451px;
        margin: 0;
      }

      .thankyou-hint {
        font-family: var(--font-regular), "GT America", -apple-system, sans-serif;
        font-size: 14px;
        letter-spacing: -0.28px;
        color: rgba(30, 30, 30, 0.5);
        margin: 16px 0 0 0;
      }

      .home-footer {
        background-color: #F2FFCF;
        padding: 60px 374px 50px 400px;
        display: flex;
        flex-direction: column;
        gap: 70px;
        position: relative;
        margin-top: 400px;
      }

      .home-footer__top {
        display: flex;
        align-items: center;
      }

      .home-footer__brand {
        display: flex;
        align-items: center;
        gap: 5px;
        width: 300px;
      }

      .home-footer__brand-name {
        font-family: var(--font-medium);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-black);
      }

      .home-footer__tagline {
        font-family: var(--typeface-canon), Georgia, serif;
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-slate);
      }

      .home-footer__controls {
        display: flex;
        gap: 20px;
        width: 150px;
      }

      .home-footer__toggle {
        font-family: var(--font-regular);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: #979441;
        background-color: #CCFF4D;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      .home-footer__nav {
        display: flex;
        padding-left: 150px;
        height: 200px;
      }

      .home-footer__nav-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 150px;
      }

      .home-footer__link {
        font-family: var(--font-pantheon);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: #979441;
        text-decoration: none;
      }

      .home-footer__link:hover {
        text-decoration: underline;
      }

      .home-footer__link--contact {
        background-color: #CCFF4D;
        width: fit-content;
      }

      .home-footer__link--product {
        font-family: var(--font-medium);
      }

      .home-footer__bottom {
        position: absolute;
        left: 0;
        bottom: 50px;
        width: 400px;
        padding-left: 60px;
      }

      .home-footer__copyright {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: rgba(101, 138, 8, 0.3);
        display: flex;
        gap: 12px;
        margin: 0;
      }

      .home-footer__social-link {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: rgba(101, 138, 8, 0.3);
        text-decoration: none;
      }

      .home-footer__social-link:hover {
        color: rgba(101, 138, 8, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="thankyou-page">
      <!-- Logo -->
      <a href="/" class="thankyou-logo">0001</a>

      <!-- Main content -->
      <main class="thankyou-main">
        <div class="thankyou-header">
          <h1 class="thankyou-title">Thank you</h1>
          <svg class="thankyou-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.5" y="0.5" width="19" height="19" stroke="#1e1e1e" stroke-opacity="0.2"/>
            <text x="10" y="14" text-anchor="middle" font-family="var(--font-medium), GT America, sans-serif" font-size="12" fill="#1e1e1e">1</text>
          </svg>
        </div>

        <p class="thankyou-description">We'll get in touch with you.</p>
        <p class="thankyou-hint">We send a copy of your inquiry to your email.</p>
      </main>

      <!-- Footer -->
      <footer class="home-footer">
        <div class="home-footer__top">
          <div class="home-footer__brand">
            <span class="home-footer__brand-name"><ds-text>0001</ds-text></span>
            <span class="home-footer__tagline"><ds-text>We deliver digital products</ds-text></span>
          </div>
          <div class="home-footer__controls">
            <button class="home-footer__toggle" id="lang-toggle"><ds-text>English</ds-text></button>
            <button class="home-footer__toggle"><ds-text>Light</ds-text></button>
          </div>
        </div>

        <nav class="home-footer__nav">
          <div class="home-footer__nav-column">
            <a href="/services" class="home-footer__link"><ds-text>Services</ds-text></a>
            <a href="#" class="home-footer__link"><ds-text>Blog</ds-text></a>
            <a href="/sentences" class="home-footer__link"><ds-text>9999 sentences</ds-text></a>
            <a href="/about" class="home-footer__link"><ds-text>About</ds-text></a>
            <a href="/contact" class="home-footer__link home-footer__link--contact"><ds-text>Contact</ds-text></a>
          </div>
          <div class="home-footer__nav-column">
            <a href="/products" class="home-footer__link home-footer__link--product"><ds-text>Products</ds-text></a>
            <a href="#" class="home-footer__link home-footer__link--product"><ds-text>Architecture</ds-text></a>
          </div>
        </nav>

        <div class="home-footer__bottom">
          <p class="home-footer__copyright">
            <span>0001 © <ds-date format="YYYY"></ds-date></span>
            <a href="https://instagram.com/0001labs" class="home-footer__social-link">Instagram</a>
            <a href="https://linkedin.com/company/0001labs" class="home-footer__social-link">LinkedIn</a>
          </p>
        </div>
      </footer>
    </div>

    <script>
      // Language cycling
      const languages = ['en', 'da', 'ja'];
      const langToggle = document.getElementById('lang-toggle');

      langToggle.addEventListener('click', () => {
        const currentLang = document.documentElement.getAttribute('lang') || 'en';
        const currentIndex = languages.indexOf(currentLang);
        const nextIndex = (currentIndex + 1) % languages.length;
        const nextLang = languages[nextIndex];

        document.documentElement.setAttribute('lang', nextLang);
        localStorage.setItem('language', nextLang);

        window.dispatchEvent(new CustomEvent('language-changed', { detail: { language: nextLang } }));
      });

      // Set initial language from localStorage
      const savedLang = localStorage.getItem('language') || 'en';
      document.documentElement.setAttribute('lang', savedLang);
    </script>
  </body>
</html>
