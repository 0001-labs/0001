<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you</title>
    <meta name="description" content="Thank you for contacting 0001. We'll get in touch with you." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        var root = document.documentElement;
        root.classList.remove("dark-theme");
        root.classList.add("light-theme");
        root.setAttribute("data-theme", "light");
      })();
    </script>

    <!-- DS one CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/DS1/1-root/one.css" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />

    <!-- DS one i18n setup -->
    <script>
      window.DS_ONE_TRANSLATIONS_FILE = "./language/translations.json";
    </script>

    <!-- DS one bundle -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js"></script>

    <!-- Page module -->
    <script type="module" src="./modules/pages/thank-you.ts"></script>

    <style>
      .thankyou-page {
        background-color: var(--page-background);
        min-height: 100vh;
        position: relative;
      }

      .thankyou-logo {
        position: absolute;
        top: 115px;
        left: 140px;
        font-family: var(--font-medium), "GT America", -apple-system, sans-serif;
        font-weight: 500;
        font-size: 24px;
        letter-spacing: -0.48px;
        color: var(--base-slate);
        text-decoration: none;
      }

      .thankyou-main {
        padding: 200px 60px 150px 400px;
        display: flex;
        flex-direction: column;
        gap: 87px;
      }

      .thankyou-header {
        display: flex;
        align-items: flex-start;
        gap: 20px;
      }

      .thankyou-title {
        font-family: var(--typeface-canon), Georgia, serif;
        font-size: 48px;
        letter-spacing: -0.96px;
        color: var(--base-slate);
        font-weight: normal;
        margin: 0;
      }

      .thankyou-icon {
        width: 20px;
        height: 20px;
        margin-top: 10px;
        color: var(--text-color-subtle);
      }

      .thankyou-description {
        font-family: var(--font-regular), "GT America", -apple-system, sans-serif;
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-black);
        line-height: 1.5;
        max-width: 451px;
        margin: 0;
      }

      .thankyou-hint {
        font-family: var(--font-regular), "GT America", -apple-system, sans-serif;
        font-size: 14px;
        letter-spacing: -0.28px;
        color: var(--text-color-subtle);
        margin: 16px 0 0 0;
      }

      .home-footer {
        background-color: var(--page-background);
        padding: 60px 374px 50px 400px;
        display: flex;
        flex-direction: column;
        gap: 70px;
        position: relative;
        margin-top: 400px;
      }

      .home-footer__top {
        display: flex;
        align-items: center;
      }

      .home-footer__brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        width: 300px;
      }

      .home-footer__brand-name {
        font-family: var(--font-medium);
        font-weight: 500;
        font-size: 16px;
        line-height: 1;
        letter-spacing: -0.32px;
        color: var(--base-black);
      }

      .home-footer__tagline {
        font-family: var(--typeface-canon), Georgia, serif;
        font-size: 16px;
        line-height: 1;
        letter-spacing: -0.32px;
        color: var(--base-slate);
      }

      .home-footer__controls {
        display: flex;
        gap: 20px;
        width: 150px;
      }

      .home-footer__nav {
        display: flex;
        padding-left: 150px;
        height: 200px;
      }

      .home-footer__nav-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 150px;
      }

      .home-footer__link {
        font-family: var(--font-pantheon);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--footer-link-color);
        text-decoration: none;
      }

      .home-footer__link:hover {
        text-decoration: underline;
      }

      .home-footer__link--product {
        font-family: var(--font-medium);
      }

      .home-footer__bottom {
        position: absolute;
        left: 0;
        bottom: 50px;
        width: 400px;
        padding-left: 60px;
      }

      .home-footer__copyright {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: var(--footer-copyright);
        display: flex;
        gap: 12px;
        margin: 0;
      }

      .home-footer__social-link {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: var(--footer-copyright);
        text-decoration: none;
      }

      .home-footer__social-link:hover {
        color: var(--footer-link-color);
      }
    </style>
  </head>
  <body>
    <div class="thankyou-page">
      <!-- Logo -->
      <a href="/" class="thankyou-logo">0001</a>

      <!-- Main content -->
      <main class="thankyou-main">
        <div class="thankyou-header">
          <h1 class="thankyou-title">Thank you</h1>
          <svg class="thankyou-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.5" y="0.5" width="19" height="19" stroke="currentColor" stroke-opacity="0.3"/>
            <text x="10" y="14" text-anchor="middle" font-family="var(--font-medium), GT America, sans-serif" font-size="12" fill="currentColor">1</text>
          </svg>
        </div>

        <p class="thankyou-description">We'll get in touch with you.</p>
        <p class="thankyou-hint">We sent a copy of your inquiry to your email.</p>
      </main>

      <!-- Footer -->
      <footer class="home-footer">
        <div class="home-footer__top">
          <div class="home-footer__brand">
            <span class="home-footer__brand-name">0001</span>
            <span class="home-footer__tagline"><ds-text>We deliver digital products</ds-text></span>
          </div>
          <div class="home-footer__controls">
            <button type="button" class="button" id="lang-toggle"><ds-text>English</ds-text></button>
            <button type="button" class="button" id="theme-toggle"><ds-text text="Light"></ds-text></button>
          </div>
        </div>

        <nav class="home-footer__nav">
          <div class="home-footer__nav-column">
            <a href="/services" class="home-footer__link"><ds-text>Services</ds-text></a>
            <a href="/sentences" class="home-footer__link"><ds-text>9999 sentences</ds-text></a>
            <a href="/about" class="home-footer__link"><ds-text>About</ds-text></a>
            <a href="/tokushoho" class="home-footer__link">Tokushoho</a>
            <a href="/contact" class="home-footer__link button"><ds-text>Contact</ds-text></a>
          </div>
          <div class="home-footer__nav-column">
            <a href="/products" class="home-footer__link home-footer__link--product"><ds-text>Products</ds-text></a>
            <a href="#" class="home-footer__link home-footer__link--product"><ds-text>Architecture</ds-text></a>
          </div>
        </nav>

        <div class="home-footer__bottom">
          <p class="home-footer__copyright">
            <span>0001 © <ds-date format="YYYY"></ds-date></span>
            <a href="https://www.instagram.com/0001hq/" class="home-footer__social-link">Instagram</a>
            <a href="https://www.linkedin.com/company/000one/" class="home-footer__social-link">LinkedIn</a>
          </p>
        </div>
      </footer>
    </div>
  </body>
</html>
