<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>0001 We deliver digital products</title>
    <meta
      name="description"
      content="0001 delivers digital products. Come work with us to leverage your business."
    />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)")
          .matches
          ? "dark"
          : "light";
        const theme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- DS one CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/DS1/1-root/one.css"
    />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />

    <!-- DS one i18n setup -->
    <script>
      window.DS_ONE_TRANSLATIONS_FILE = "./language/translations.json";
    </script>

    <!-- DS one bundle -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js"
    ></script>

    <!-- 0001 components -->
    <script type="module" src="./components/0001-h1.js"></script>

    <style>
      .home-page {
        background-color: #ffffff;
        min-height: 100vh;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 50px;
      }

      .decorative-image {
        width: 200px;
        height: 150px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
      }

      .decorative-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .decorative-image::after {
        content: "";
        position: absolute;
        inset: 0;
        background: #ccff4d;
        mix-blend-mode: screen;
      }

      .decorative-image::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(204, 255, 77, 0.3);
        z-index: 1;
      }

      .home-content {
        display: flex;
        flex-direction: column;
        gap: 150px;
        width: 100%;
      }

      .hero {
        padding-left: 400px;
        padding-right: 300px;
      }

      .hero__inner {
        width: 600px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .hero__title-wrapper {
        position: relative;
        cursor: pointer;
      }

      .hero__number {
        position: absolute;
        right: calc(100% + 10px);
        width: 200px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 10px;
        font-family: var(--font-medium);
        font-size: 48px;
        letter-spacing: -0.96px;
        color: var(--base-slate);
        text-align: right;
      }

      .hero__media {
        position: relative;
        width: 400px;
        min-height: 300px;
      }

      .hero__image {
        width: 100%;
        height: 100%;
        transition: opacity 0.5s ease;
      }

      .hero__image.hidden {
        opacity: 0;
      }

      .hero__image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hero__timer {
        position: absolute;
        top: -4px;
        left: 0;
        width: 400px;
        height: 4px;
        background-color: rgba(204, 255, 77, 0.25);
        z-index: 10;
        transform: translateY(-100%);
        transform-origin: right;
        animation: timer-countdown 4s linear forwards;
      }

      @keyframes timer-countdown {
        from {
          transform: scaleX(1);
        }
        to {
          transform: scaleX(0);
        }
      }

      .hero__description {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        max-width: 800px;
        opacity: 0;
        transition: opacity 0.5s ease;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding-top: 20px;
        gap: 20px;
        pointer-events: none;
      }

      .hero__description.revealed {
        opacity: 1;
        pointer-events: auto;
      }

      .hero__description p {
        font-family:
          var(--font-regular),
          "GT America",
          -apple-system,
          sans-serif;
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-slate);
        line-height: 1.5;
        margin: 0;
        max-width: 100%;
        width: 100%;
      }

      .hero__buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      .hero__text-link {
        font-family:
          var(--font-regular),
          "GT America",
          -apple-system,
          sans-serif;
        font-size: 14px;
        letter-spacing: -0.28px;
        color: var(--base-slate);
        text-decoration: none;
      }

      .hero__text-link:hover {
        text-decoration: underline;
      }

      .hero__timer.hidden {
        display: none;
      }

      .home-footer {
        background-color: #f2ffcf;
        padding: 60px 374px 50px 400px;
        display: flex;
        flex-direction: column;
        gap: 70px;
        position: relative;
      }

      .home-footer__top {
        display: flex;
        align-items: center;
      }

      .home-footer__brand {
        display: flex;
        align-items: center;
        gap: 5px;
        width: 300px;
      }

      .home-footer__brand-name {
        font-family: var(--font-medium);
        font-weight: 500;
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-black);
      }

      .home-footer__tagline {
        font-family: var(--typeface-canon), Georgia, serif;
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-slate);
      }

      .home-footer__controls {
        display: flex;
        gap: 20px;
        width: 150px;
      }

      .home-footer__toggle {
        font-family: var(--font-regular);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: #979441;
        background-color: #ccff4d;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      .home-footer__nav {
        display: flex;
        padding-left: 150px;
        height: 200px;
      }

      .home-footer__nav-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 150px;
      }

      .home-footer__link {
        font-family: var(--font-pantheon);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: #979441;
        text-decoration: none;
      }

      .home-footer__link:hover {
        text-decoration: underline;
      }

      .home-footer__link--contact {
        background-color: #ccff4d;
        width: fit-content;
      }

      .home-footer__link--product {
        font-family: var(--font-medium);
      }

      .home-footer__bottom {
        position: absolute;
        left: 0;
        bottom: 50px;
        width: 400px;
        padding-left: 60px;
      }

      .home-footer__copyright {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: rgba(101, 138, 8, 0.3);
        display: flex;
        gap: 12px;
        margin: 0;
      }

      .home-footer__social-link {
        font-family: var(--font-medium);
        font-size: 12px;
        letter-spacing: -0.24px;
        color: rgba(101, 138, 8, 0.3);
        text-decoration: none;
      }

      .home-footer__social-link:hover {
        color: rgba(101, 138, 8, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="home-page">
      <!-- Decorative image top-left -->
      <div class="decorative-image" id="randomize-btn">
        <img
          src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400"
          alt="Click to randomize sentence"
        />
      </div>

      <!-- Main content -->
      <div class="home-content">
        <main class="hero">
          <div class="hero__inner">
            <div class="hero__title-wrapper">
              <span class="hero__number" id="hero-number">0001</span>
              <one-h1 id="hero-tagline">sentence-1</one-h1>
            </div>

            <div class="hero__media">
              <div class="hero__image">
                <img
                  src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800"
                  alt="0001"
                />
              </div>
              <div class="hero__timer" id="hero-timer"></div>
              <div class="hero__description">
                <p><ds-text>hero-p1</ds-text></p>
                <p><ds-text>hero-p2</ds-text></p>
                <div class="hero__buttons">
                  <a href="/services"
                    ><ds-button primary
                      ><ds-text>See our services</ds-text></ds-button
                    ></a
                  >
                  <a href="/products" class="hero__text-link"
                    ><ds-text>See our past work</ds-text></a
                  >
                </div>
              </div>
            </div>
          </div>
        </main>

        <!-- Footer -->
        <footer class="home-footer">
          <div class="home-footer__top">
            <div class="home-footer__brand">
              <span class="home-footer__brand-name">0001</span>
              <span class="home-footer__tagline"
                ><ds-text>We deliver digital products</ds-text></span
              >
            </div>
            <div class="home-footer__controls">
              <button class="home-footer__toggle" id="lang-toggle">
                <ds-text>English</ds-text>
              </button>
              <button class="home-footer__toggle">
                <ds-text>Light</ds-text>
              </button>
            </div>
          </div>

          <nav class="home-footer__nav">
            <div class="home-footer__nav-column">
              <a href="/services" class="home-footer__link"
                ><ds-text>Services</ds-text></a
              >
              <a href="/sentences" class="home-footer__link"
                ><ds-text>9999 sentences</ds-text></a
              >
              <a href="/about" class="home-footer__link"
                ><ds-text>About</ds-text></a
              >
              <a
                href="/contact"
                class="home-footer__link home-footer__link--contact"
                ><ds-text>Contact</ds-text></a
              >
            </div>
            <div class="home-footer__nav-column">
              <a
                href="/products"
                class="home-footer__link home-footer__link--product"
                ><ds-text>Products</ds-text></a
              >
              <a href="#" class="home-footer__link home-footer__link--product"
                ><ds-text>Architecture</ds-text></a
              >
            </div>
          </nav>

          <div class="home-footer__bottom">
            <p class="home-footer__copyright">
              <span>0001 © <ds-date format="YYYY"></ds-date></span>
              <a
                href="https://instagram.com/0001labs"
                class="home-footer__social-link"
                >Instagram</a
              >
              <a
                href="https://linkedin.com/company/0001labs"
                class="home-footer__social-link"
                >LinkedIn</a
              >
            </p>
          </div>
        </footer>
      </div>
    </div>

    <script>
      const sentenceKeys = [
        1, 714, 1241, 1429, 2143, 2857, 3571, 4286, 5000, 5714, 6429, 7143,
        7857, 9999,
      ];

      const images = {
        1: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800",
        714: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800",
        1241: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800",
        1429: "https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=800",
        2143: "https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=800",
        2857: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=800",
        3571: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800",
        4286: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800",
        5000: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=800",
        5714: "https://images.unsplash.com/photo-1551650975-87deedd944c3?w=800",
        6429: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800",
        7143: "https://images.unsplash.com/photo-1484417894907-623942c8ee29?w=800",
        7857: "https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=800",
        9999: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800",
      };

      let currentSentenceKey = 1;

      const heroNumber = document.getElementById("hero-number");
      const heroTagline = document.getElementById("hero-tagline");
      const heroImage = document.querySelector(".hero__image img");
      const decorativeImage = document.querySelector(".decorative-image img");
      const randomizeBtn = document.getElementById("randomize-btn");

      // Randomize function - just update the ds-text key, it handles translation
      function randomizeSentence() {
        currentSentenceKey =
          sentenceKeys[Math.floor(Math.random() * sentenceKeys.length)];
        const image = images[currentSentenceKey];

        heroNumber.textContent = String(currentSentenceKey).padStart(4, "0");
        heroTagline.textContent = `sentence-${currentSentenceKey}`;

        // Update images
        heroImage.src = image;
        decorativeImage.src = image.replace("w=800", "w=400");
      }

      // Timer elements
      const heroTimer = document.getElementById("hero-timer");
      const heroDescription = document.querySelector(".hero__description");
      const heroImageDiv = document.querySelector(".hero__image");
      let timerTimeout = null;

      // Start/restart timer function
      function startTimer() {
        // Clear existing timer
        if (timerTimeout) {
          clearTimeout(timerTimeout);
        }

        // Reset states
        heroTimer.classList.remove("hidden");
        heroImageDiv.classList.remove("hidden");
        heroDescription.classList.remove("revealed");

        // Restart animation by removing and re-adding element
        heroTimer.style.animation = "none";
        heroTimer.offsetHeight; // Trigger reflow
        heroTimer.style.animation = "";

        // After 4 seconds: hide timer and image, reveal description
        timerTimeout = setTimeout(() => {
          heroTimer.classList.add("hidden");
          heroImageDiv.classList.add("hidden");
          heroDescription.classList.add("revealed");
        }, 4000);
      }

      // Hero randomize on click (decorative image)
      randomizeBtn.addEventListener("click", () => {
        randomizeSentence();
        startTimer();
      });

      // Hero randomize on click (title)
      const heroTitleWrapper = document.querySelector(".hero__title-wrapper");
      heroTitleWrapper.addEventListener("click", () => {
        randomizeSentence();
        startTimer();
      });

      // Start timer on page load
      startTimer();

      // Language cycling - use ds-one's setLanguage for proper language switching
      const languages = ["en", "da", "ja"];
      const langToggle = document.getElementById("lang-toggle");

      langToggle.addEventListener("click", async () => {
        const currentLang = localStorage.getItem("language") || "en";
        const currentIndex = languages.indexOf(currentLang);
        const nextIndex = (currentIndex + 1) % languages.length;
        const nextLang = languages[nextIndex];

        const dsOne =
          await import("https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js");
        dsOne.setLanguage(nextLang);
      });

      // Set initial language from localStorage on page load
      (async () => {
        const savedLang = localStorage.getItem("language");
        if (savedLang && savedLang !== "en") {
          const dsOne =
            await import("https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js");
          dsOne.setLanguage(savedLang);
        }
      })();
    </script>
  </body>
</html>
