<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>0001 We deliver digital products</title>
    <meta
      name="description"
      content="0001 delivers digital products. Come work with us to leverage your business."
    />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        var root = document.documentElement;
        var theme = localStorage.getItem("theme");
        if (theme !== "dark") {
          theme = "light";
        }
        root.classList.toggle("light-theme", theme === "light");
        root.classList.toggle("dark-theme", theme === "dark");
        root.setAttribute("data-theme", theme);
      })();
    </script>
<!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />
<!-- 0001 components -->
    <script type="module" src="./components/one-h1.ts"></script>
    <script type="module" src="./components/one-footer.ts"></script>

    <!-- Page module -->
    <script type="module" src="./modules/pages/index.ts"></script>

    <style>
      .home-page {
        background-color: var(--page-background);
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 50px;
      }

      .decorative-image {
        width: 200px;
        height: 150px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
      }

      .decorative-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .decorative-image::after {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--chartreuse-green);
        mix-blend-mode: screen;
      }

      .decorative-image::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--surface-overlay-strong);
        z-index: 1;
      }

      .home-content {
        display: flex;
        flex-direction: column;
        gap: 150px;
        width: 100%;
      }

      .hero {
        padding-left: 400px;
        padding-right: 300px;
      }

      .hero__inner {
        width: min(100%, 400px);
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      /* Image cover reveals the copy beneath it on both desktop and mobile */
      .hero__visual-wrap {
        position: relative;
        width: 400px;
        height: 300px;
      }

      .hero__title-wrapper {
        position: relative;
        cursor: pointer;
        max-width: 400px;
      }

      .hero__title-wrapper one-h1 {
        margin-top: 5px;
        transform: translateY(-2px);
      }

      .hero__number {
        position: absolute;
        top: 2px;
        right: calc(100% + 10px);
        font-family: var(--font-medium);
        font-size: 48px;
        line-height: 1.2;
        letter-spacing: -0.96px;
        color: var(--base-slate);
        text-align: right;
        user-select: none;
        -webkit-user-select: none;
      }

      .hero__media {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--base-cream);
      }

      .hero__image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        transition: opacity 0.5s ease;
      }

      .hero__image.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .hero__image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hero__timer {
        position: absolute;
        top: -2px;
        left: 0;
        width: 100%;
        height: 4px;
        background-color: var(--chartreuse-green);
        opacity: 0.6;
        z-index: 10;
        transform-origin: right;
        animation: timer-countdown 3s linear forwards;
      }

      @keyframes timer-countdown {
        from {
          transform: scaleX(1);
        }
        to {
          transform: scaleX(0);
        }
      }

      .hero__description {
        position: absolute;
        inset: 0;
        width: 100%;
        box-sizing: border-box;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-end;
        padding: 0;
        margin: 0;
        gap: 16px;
        background: var(--base-cream);
      }

      .hero__description > * {
        width: 100%;
      }

      .hero__description p {
        font-family: var(--font-regular);
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-slate);
        line-height: 1.5;
        margin: 0;
        padding: 0;
      }

      .hero__description p + p {
        margin-top: 0;
      }

      .hero__description p > [data-i18n] {
        display: block;
        height: auto;
        min-height: 0;
        max-width: 100%;
        margin: 0;
        padding: 0;
        font: inherit;
        letter-spacing: inherit;
        color: inherit;
        line-height: inherit;
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .hero__buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        margin: 20px 0 0;
        padding: 0;
        text-align: center;
      }

      /* Same 16px bar as footer; wins over any late DS one / link rules */
      .hero__description .hero__buttons a.button {
        display: inline-block;
        box-sizing: border-box;
        height: 16px;
        max-height: 16px;
        min-height: 0;
        padding: 0;
        line-height: 16px;
        font-size: 14px;
        font-family: var(--font-regular);
        vertical-align: top;
        overflow: hidden;
      }

      .hero__text-link {
        font-family: var(--font-regular);
        font-size: 14px;
        letter-spacing: -0.28px;
        color: var(--base-black);
        margin: 0;
        padding: 0;
      }

      .hero__timer.hidden {
        display: none;
      }

      /* Mobile styles - using DS one .mobile class and --sf scaling factor */
      @media (max-width: 768px) {
        .home-page {
        gap: 0;
        overflow-x: clip;
        }
      }

      @media (max-width: 768px) {
        .decorative-image {
        display: none;
        }
      }

      @media (max-width: 768px) {
        .home-content {
        gap: 80px;
        }
      }

      @media (max-width: 768px) {
        .hero {
        padding: 30px 0;
        }
      }

      @media (max-width: 768px) {
        .hero__inner {
        width: 100%;
        gap: 24px;
        }
      }

      @media (max-width: 768px) {
        .hero__title-wrapper {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 0 20px;
        box-sizing: border-box;
        }
      }

      @media (max-width: 768px) {
        .hero__title-wrapper one-h1 {
        margin-top: 0;
        transform: translateY(-2px);
        width: 100%;
        }
      }

      @media (max-width: 768px) {
        .hero__number {
        position: static;
        width: auto;
        height: auto;
        font-size: 32px;
        line-height: 1;
        padding: 0;
        margin: 0;
        display: block;
        }
      }

      @media (max-width: 768px) {
        .hero__visual-wrap {
        width: 100%;
        height: auto;
        display: flex;
        flex-direction: column;
        gap: 0;
        }
      }

      @media (max-width: 768px) {
        .hero__media {
        width: 100vw;
        max-width: none;
        margin-left: calc(50% - 50vw);
        margin-right: calc(50% - 50vw);
        height: auto;
        aspect-ratio: 4/3;
        flex-shrink: 0;
        }
      }

      @media (max-width: 768px) {
        .hero__image {
        width: 100%;
        height: 100%;
        }
      }

      @media (max-width: 768px) {
        .hero__timer {
        width: 100%;
        }
      }

      @media (max-width: 768px) {
        .hero__description {
        padding: 0;
        }
      }

      @media (max-width: 768px) {
        .hero__description p {
        font-size: 16px;
        line-height: 1.5;
        }
      }

      @media (max-width: 768px) {
        .hero__buttons {
        align-items: center;
        gap: 16px;
        margin-top: 20px;
        }
      }

      @media (max-width: 768px) {
        .hero__description .hero__buttons a.button {
        height: 16px;
        max-height: 16px;
        line-height: 16px;
        font-size: 14px;
        }
      }

      /* Match chartreuse CTA typography — .button uses --sf on mobile; plain link did not */
      @media (max-width: 768px) {
        .hero__description .hero__buttons .hero__text-link {
        font-size: 14px;
        letter-spacing: -0.28px;
        }
      }

    </style>
  </head>
  <body>
    <div class="home-page">
      <!-- Decorative image top-left -->
      <div class="decorative-image" id="randomize-btn">
        <img
          src="/assets/imagery/retro-monitors.png"
          alt="Click to randomize sentence"
        />
      </div>
      <!-- Main content -->
      <div class="home-content">
        <main class="hero">
          <div class="hero__inner">
            <div class="hero__title-wrapper">
              <span class="hero__number" id="hero-number">0001</span>
              <one-h1 id="hero-tagline">sentence-1</one-h1>
            </div>

            <div class="hero__visual-wrap">
              <div class="hero__media">
                <div class="hero__description">
                  <p><span data-i18n="hero-p1">hero-p1</span></p>
                  <p><span data-i18n="hero-p2">hero-p2</span></p>
                  <div class="hero__buttons">
                    <a href="/services" class="button" data-i18n="See our services">See our services</a>
                    <a href="/products" class="hero__text-link" data-i18n="See our past work">See our past work</a>
                  </div>
                </div>
                <div class="hero__image">
                  <img src="/assets/imagery/retro-monitors.png" alt="0001" />
                </div>
                <div class="hero__timer" id="hero-timer"></div>
              </div>
            </div>
          </div>
        </main>

        <!-- Footer -->
        <one-footer></one-footer>
      </div>
    </div>
  </body>
</html>
