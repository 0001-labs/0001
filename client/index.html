<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>0001 We deliver digital products</title>
    <meta
      name="description"
      content="0001 delivers digital products. Come work with us to leverage your business."
    />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent FOUC -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)")
          .matches
          ? "dark"
          : "light";
        const theme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- DS one CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/DS1/1-root/one.css"
    />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./design/css/tokens.css" />
    <link rel="stylesheet" href="./design/css/screen.css" />

    <!-- DS one i18n setup -->
    <script>
      window.DS_ONE_TRANSLATIONS_FILE = "./language/translations.json";
    </script>

    <!-- DS one bundle -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/ds-one@0.3.0-alpha.8/dist/ds-one.bundle.min.js"
    ></script>

    <!-- 0001 components -->
    <script type="module" src="./components/one-h1.ts"></script>
    <script type="module" src="./components/one-footer.ts"></script>

    <!-- Page module -->
    <script type="module" src="./modules/pages/index.ts"></script>

    <style>
      .home-page {
        background-color: #ffffff;
        min-height: 100vh;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 50px;
      }

      .decorative-image {
        width: 200px;
        height: 150px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
      }

      .decorative-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .decorative-image::after {
        content: "";
        position: absolute;
        inset: 0;
        background: #ccff4d;
        mix-blend-mode: screen;
      }

      .decorative-image::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(204, 255, 77, 0.3);
        z-index: 1;
      }

      .home-content {
        display: flex;
        flex-direction: column;
        gap: 150px;
        width: 100%;
      }

      .hero {
        padding-left: 400px;
        padding-right: 300px;
      }

      .hero__inner {
        width: 600px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .hero__title-wrapper {
        position: relative;
        cursor: pointer;
      }

      .hero__number {
        position: absolute;
        top: 0;
        right: calc(100% + 10px);
        font-family: var(--font-medium);
        font-size: 48px;
        line-height: 1.2;
        letter-spacing: -0.96px;
        color: var(--base-slate);
        text-align: right;
        user-select: none;
        -webkit-user-select: none;
      }

      .hero__media {
        position: relative;
        width: 400px;
        height: 300px;
      }

      .hero__image {
        width: 100%;
        height: 100%;
        transition: opacity 0.5s ease;
      }

      .hero__image.hidden {
        opacity: 0;
      }

      .hero__image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hero__timer {
        position: absolute;
        top: -4px;
        left: 0;
        width: 100%;
        height: 4px;
        background-color: rgba(204, 255, 77, 0.25);
        z-index: 10;
        transform: translateY(-100%);
        transform-origin: right;
        animation: timer-countdown 4s linear forwards;
      }

      @keyframes timer-countdown {
        from {
          transform: scaleX(1);
        }
        to {
          transform: scaleX(0);
        }
      }

      .hero__description {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        max-width: 400px;
        opacity: 0;
        transition: opacity 0.5s ease;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding-top: 20px;
        gap: 20px;
        pointer-events: none;
      }

      .hero__description.revealed {
        opacity: 1;
        pointer-events: auto;
      }

      .hero__description p {
        font-family:
          var(--font-regular),
          "GT America",
          -apple-system,
          sans-serif;
        font-size: 16px;
        letter-spacing: -0.32px;
        color: var(--base-slate);
        line-height: 1.5;
        margin: 0;
        align-self: stretch;
      }

      .hero__buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      .hero__text-link {
        font-family:
          var(--font-regular),
          "GT America",
          -apple-system,
          sans-serif;
        font-size: 14px;
        letter-spacing: -0.28px;
        color: var(--base-slate);
        text-decoration: none;
      }

      .hero__text-link:hover {
        text-decoration: underline;
      }

      .hero__timer.hidden {
        display: none;
      }


      /* Mobile styles - using DS one .mobile class and --sf scaling factor */
      html.mobile .home-page {
        gap: 0;
      }

      html.mobile .decorative-image {
        display: none;
      }

      html.mobile .home-content {
        gap: calc(80px * var(--sf));
      }

      html.mobile .hero {
        padding: calc(30px * var(--sf)) calc(20px * var(--sf));
      }

      html.mobile .hero__inner {
        width: 100%;
        gap: calc(24px * var(--sf));
      }

      html.mobile .hero__title-wrapper {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: calc(8px * var(--sf));
      }

      html.mobile .hero__number {
        position: static;
        width: auto;
        height: auto;
        font-size: 32px;
        padding: 0;
        margin: 0;
        display: inline;
      }

      html.mobile .hero__media {
        width: 100%;
        min-height: auto;
      }

      html.mobile .hero__image {
        width: 100%;
        aspect-ratio: 4/3;
      }

      html.mobile .hero__timer {
        width: 100%;
      }

      html.mobile .hero__description {
        position: static;
        opacity: 1;
        pointer-events: auto;
        max-width: 100%;
        padding-top: calc(24px * var(--sf));
        gap: calc(16px * var(--sf));
      }

      html.mobile .hero__description p {
        font-size: 16px;
      }

      html.mobile .hero__buttons {
        align-items: flex-start;
        gap: calc(16px * var(--sf));
        margin-top: calc(8px * var(--sf));
      }

      html.mobile .hero__text-link {
        font-size: calc(14px * var(--sf));
      }

      html.mobile .hero__image.hidden {
        display: none;
      }

    </style>
  </head>
  <body>
    <div class="home-page">
      <!-- Decorative image top-left -->
      <div class="decorative-image" id="randomize-btn">
        <img
          src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400"
          alt="Click to randomize sentence"
        />
      </div>

      <!-- Main content -->
      <div class="home-content">
        <main class="hero">
          <div class="hero__inner">
            <div class="hero__title-wrapper">
              <span class="hero__number" id="hero-number">0001</span>
              <one-h1 id="hero-tagline">sentence-1</one-h1>
            </div>

            <div class="hero__media">
              <div class="hero__image">
                <img
                  src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800"
                  alt="0001"
                />
              </div>
              <div class="hero__timer" id="hero-timer"></div>
              <div class="hero__description">
                <p><ds-text>hero-p1</ds-text></p>
                <p><ds-text>hero-p2</ds-text></p>
                <div class="hero__buttons">
                  <a href="/services"
                    ><ds-button primary
                      ><ds-text>See our services</ds-text></ds-button
                    ></a
                  >
                  <a href="/products" class="hero__text-link"
                    ><ds-text>See our past work</ds-text></a
                  >
                </div>
              </div>
            </div>
          </div>
        </main>

        <!-- Footer -->
        <one-footer></one-footer>
      </div>
    </div>

  </body>
</html>
